name: Publish

# Publishes the CsharpLspMux dotnet tool to nuget.org when a version tag is pushed.
# Tag must match the <Version> in the csproj, e.g.:  git tag v0.1.0 && git push --tags
on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    # Gated environment: the job pauses for a required reviewer before it can
    # publish, even if someone else pushes a tag. The nuget.org Trusted
    # Publishing policy is also scoped to this environment name.
    environment: nuget
    permissions:
      contents: write # create the GitHub Release + upload package assets
      id-token: write # required for OIDC: mint the short-lived NuGet key
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Verify tag matches csproj version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          csproj=$(grep -oPm1 '(?<=<Version>)[^<]+' src/CsharpLspMux/CsharpLspMux.csproj)
          echo "Tag version:    $tag"
          echo "csproj version: $csproj"
          if [ "$tag" != "$csproj" ]; then
            echo "::error::Tag v$tag does not match <Version>$csproj</Version> in CsharpLspMux.csproj"
            exit 1
          fi

      - name: Restore (locked)
        run: dotnet restore --locked-mode

      # roslyn-language-server is a *local* dotnet tool (see
      # .config/dotnet-tools.json), which is not on PATH. The mux launches it as
      # a bare "roslyn-language-server" process, so the E2E suite needs it on
      # PATH — install it globally and add the tools dir to PATH.
      - name: Install roslyn-language-server on PATH (E2E tests)
        run: |
          dotnet tool install --global roslyn-language-server --version 5.9.0-1.26303.1
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Test
        run: dotnet test -c Release --no-build

      - name: Pack
        run: dotnet pack src/CsharpLspMux/CsharpLspMux.csproj -c Release --no-build -o artifacts

      # Trusted Publishing: exchange the OIDC token for a short-lived (1h) NuGet
      # key. Runs immediately before push so the key doesn't expire in flight.
      - name: NuGet login (OIDC -> temp API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }} # your nuget.org profile name (not email)

      - name: Push to nuget.org
        run: >
          dotnet nuget push "artifacts/*.nupkg"
          --api-key "${{ steps.login.outputs.NUGET_API_KEY }}"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

      # Publish a GitHub Release for this tag with auto-generated notes and the
      # packed artifacts attached. The tag already exists (it triggered this
      # run), so this does not re-fire the workflow. Idempotent: a re-run
      # updates the assets on the existing release instead of failing.
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # A SemVer suffix (e.g. v0.2.0-preview.1) => prerelease, and it must
          # not be marked "Latest" so it can't outrank a stable release.
          prerelease=""
          case "$GITHUB_REF_NAME" in
            *-*) prerelease="--prerelease --latest=false" ;;
          esac
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" artifacts/*.nupkg artifacts/*.snupkg --clobber
          else
            gh release create "$GITHUB_REF_NAME" artifacts/*.nupkg artifacts/*.snupkg \
              --title "$GITHUB_REF_NAME" --generate-notes $prerelease
          fi
